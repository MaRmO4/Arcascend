<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ArcAscend — Login</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    background: #0f1419; color: #e6e9ed;
    min-height: 100vh; display: flex;
    align-items: center; justify-content: center;
  }
  .card {
    background: #1a2129; border: 1px solid #2d3742;
    border-radius: 16px; padding: 40px; width: 100%;
    max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .logo {
    font-size: 26px; font-weight: 800;
    text-align: center; margin-bottom: 6px;
    background: linear-gradient(135deg, #4f9eff, #a78bfa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .tagline { text-align: center; color: #8b95a1; font-size: 13px; margin-bottom: 32px; }
  label { display: block; font-size: 12px; color: #8b95a1; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  input { width: 100%; background: #232c36; border: 1px solid #2d3742; color: #e6e9ed; padding: 12px 14px; border-radius: 8px; font-size: 14px; margin-bottom: 18px; outline: none; }
  input:focus { border-color: #4f9eff; }
  .btn { width: 100%; background: #4f9eff; color: white; border: none; padding: 13px; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-bottom: 12px; }
  .btn.secondary { background: #232c36; border: 1px solid #2d3742; color: #e6e9ed; }
  .message { text-align: center; font-size: 13px; margin-top: 14px; min-height: 20px; }
  .message.error { color: #ef4444; }
  .message.success { color: #22c55e; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">ArcAscend</div>
  <div class="tagline">CRM for Personal Trainers</div>
  <label>Email</label>
  <input type="email" id="email" placeholder="you@example.com" />
  <label>Password</label>
<input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter') logIn()" />
  <button class="btn" onclick="logIn()">Log In</button>
  <button class="btn secondary" onclick="signUp()">Create Account</button>
  <div class="message" id="msg"></div>
</div>

<script>
  var SUPABASE_URL = 'https://udzfpeztwgsynjhwjwic.supabase.co'
  var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVkemZwZXp0d2dzeW5qaHdqd2ljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2OTcwOTcsImV4cCI6MjA5NTI3MzA5N30.Eke_HxZtww3zVekkPMDydT90NkVWSltJjA2fr40oquQ'

  function signUp() {
    var email = document.getElementById('email').value
    var password = document.getElementById('password').value
    var msg = document.getElementById('msg')
    msg.className = 'message'
    msg.textContent = 'Creating account...'

    fetch(SUPABASE_URL + '/auth/v1/signup', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY
      },
      body: JSON.stringify({ email: email, password: password })
    })
    .then(function(r) { return r.json() })
    .then(function(data) {
      if (data.error) {
        msg.className = 'message error'
        msg.textContent = data.error.message || data.msg
      } else {
        msg.className = 'message success'
        msg.textContent = 'Account created! You can now log in.'
      }
    })
  }

  function logIn() {
    var email = document.getElementById('email').value
    var password = document.getElementById('password').value
    var msg = document.getElementById('msg')
    msg.className = 'message'
    msg.textContent = 'Logging in...'

    fetch(SUPABASE_URL + '/auth/v1/token?grant_type=password', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY
      },
      body: JSON.stringify({ email: email, password: password })
    })
    .then(function(r) { return r.json() })
    .then(function(data) {
      if (data.error || !data.access_token) {
        msg.className = 'message error'
        msg.textContent = data.error_description || data.error || 'Login failed'
      } else {
        localStorage.clear()
        localStorage.setItem('arcascend_token', data.access_token)
        localStorage.setItem('arcascend_refresh_token', data.refresh_token)
        localStorage.setItem('arcascend_token_expires_at', String(Date.now() + (data.expires_in || 3600) * 1000))
        localStorage.setItem('arcascend_user_id', data.user.id)
        localStorage.setItem('arcascend_user_email', data.user.email)
        msg.className = 'message success'
        msg.textContent = 'Success! Redirecting...'
        setTimeout(function() { window.location.href = 'index.html' }, 1000)
      }
    })
  }
</script>
</body>
</html>
